heat_template_version: 2021-04-16
description: Template security group - autorise SSH, HTTP, HTTPS et les metriques

parameters:
  security_group_name:
    type: string
    description: Nom du security group
    default: heat-security-group

resources:

  security_group:
    type: OS::Neutron::SecurityGroup
    properties:
      name: { get_param: security_group_name }
      description: Security group pour les VMs deployees par Heat
      rules:
        # SSH
        - protocol: tcp
          port_range_min: 22
          port_range_max: 22
          remote_ip_prefix: 0.0.0.0/0
        # HTTP
        - protocol: tcp
          port_range_min: 80
          port_range_max: 80
          remote_ip_prefix: 0.0.0.0/0
        # HTTPS
        - protocol: tcp
          port_range_min: 443
          port_range_max: 443
          remote_ip_prefix: 0.0.0.0/0
        # Agent metriques vers le dashboard (port 8080)
        - protocol: tcp
          port_range_min: 8080
          port_range_max: 8080
          remote_ip_prefix: 0.0.0.0/0
        # ICMP (ping)
        - protocol: icmp
          remote_ip_prefix: 0.0.0.0/0

outputs:
  security_group_id:
    description: ID du security group cree
    value: { get_resource: security_group }
